<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Management | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }

        .navbar { 
            background: #1e293b !important; 
            border-bottom: 1px solid #334155; 
        }

        .card { 
            background: #1e293b !important; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            overflow: hidden; 
        }

        .table { 
            background-color: #1e293b !important; 
            margin-bottom: 0; 
        }

        .table td, .table th { 
            border-bottom: 1px solid #334155 !important;
            padding: 16px !important;
        }

        .table thead th { 
            background-color: #0f172a !important; 
            color: #38bdf8 !important; 
            text-transform: uppercase; 
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }

        .table-hover tbody tr:hover { 
            background-color: #2d3a4f !important; 
        }

        /* 🔥 FIELD BADGE STYLE (for ID, Title, Director, Year, Genre) */
        .field-badge {
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #ffffff;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            display: inline-block;
        }

        .badge-rating { 
            background: #f59e0b; 
            color: #000; 
            font-weight: bold; 
        }

        .btn-add { 
            background: #38bdf8; 
            border: none; 
            color: #000; 
            font-weight: 600; 
        }

        .edit-link { 
            color: #38bdf8; 
            text-decoration: none; 
            font-weight: 600;
        }

        .delete-link { 
            color: #f87171; 
            text-decoration: none; 
            font-weight: 600;
        }

        .edit-link:hover, .delete-link:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-film me-2 text-info"></i> MOVIE HUB
        </span>
        <a class="btn btn-add" th:href="@{/movies/new}">+ Add Movie</a>
    </div>
</nav>

<div class="container mt-5 pb-5">
    <h2 class="fw-bold mb-4">
        Current <span class="text-info">Catalog</span>
    </h2>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Genre</th>
                        <th>Director</th>
                        <th>Year</th>
                        <th>Rating</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="movie : ${movies}">

                        <td>
                            <span class="field-badge" th:text="${movie.id}"></span>
                        </td>

                        <td>
                            <span class="field-badge" th:text="${movie.title}"></span>
                        </td>

                        <td>
                            <span class="field-badge" th:text="${movie.genre}"></span>
                        </td>

                        <td>
                            <span class="field-badge" th:text="${movie.director}"></span>
                        </td>

                        <td>
                            <span class="field-badge" th:text="${movie.releaseYear}"></span>
                        </td>

                        <td>
                            <span class="badge rounded-pill badge-rating">
                                <i class="bi bi-star-fill me-1"></i>
                                <span th:text="${movie.rating}"></span>
                            </span>
                        </td>

                        <td class="text-end">
                            <a class="edit-link me-3"
                               th:href="@{/movies/edit/{id}(id=${movie.id})}">
                                <i class="bi bi-pencil"></i> Edit
                            </a>

                            <a class="delete-link"
                               th:href="@{/movies/delete/{id}(id=${movie.id})}"
                               onclick="return confirm('Delete this movie?');">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>

                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
