<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .navbar { background: rgba(30, 41, 59, 0.9) !important; backdrop-filter: blur(10px); border-bottom: 1px solid #334155; }
        
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 30px; }
        
        /* Input Visibility Fixes */
        .form-control { 
            background-color: #0f172a !important; 
            border: 1px solid #475569 !important; 
            color: #ffffff !important; 
            padding: 12px;
        }
        .form-control:focus { 
            border-color: #38bdf8 !important; 
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.15);
        }
        .form-control::placeholder {
            color: #64748b !important; /* Brighter placeholder color */
            opacity: 1;
        }
        
        .form-label { color: #cbd5e1; font-weight: 500; margin-bottom: 8px; }
        .btn-save { background: #38bdf8; color: #000; border: none; font-weight: 700; padding: 14px; border-radius: 8px; transition: 0.2s; }
        .btn-save:hover { background: #7dd3fc; transform: translateY(-1px); }
        .btn-back { background: transparent; border: 1px solid #475569; color: #94a3b8; padding: 12px; border-radius: 8px; text-decoration: none; text-align: center; }
        .btn-back:hover { border-color: #94a3b8; color: #fff; }
        
        h3 { color: #38bdf8; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="bi bi-film me-2 text-info"></i> MOVIE HUB</span>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-2xl">
                <div class="text-center mb-4">
                    <h3 class="fw-bold mb-1" th:text="${movie.id} == null ? 'Add New Movie' : 'Update Movie'"></h3>
                    <p class="text-secondary small">Fill in the details to update your catalog</p>
                </div>

                <form th:action="@{/movies/save}" th:object="${movie}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label class="form-label">Movie Title</label>
                        <input type="text" class="form-control" placeholder="e.g. Inception" th:field="*{title}" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Genre</label>
                            <input type="text" class="form-control" placeholder="e.g. Sci-Fi" th:field="*{genre}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Rating (0-10)</label>
                            <input type="number" step="0.1" min="0" max="10" class="form-control" placeholder="8.5" th:field="*{rating}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Director</label>
                        <input type="text" class="form-control" placeholder="e.g. Christopher Nolan" th:field="*{director}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Release Year</label>
                        <input type="number" class="form-control" placeholder="e.g. 2010" th:field="*{releaseYear}" required>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-save">
                            <i class="bi bi-cloud-arrow-up-fill me-2"></i>Save Movie Entry
                        </button>
                        <a th:href="@{/movies}" class="btn btn-back">
                            <i class="bi bi-arrow-left me-1"></i> Back to Catalog
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
